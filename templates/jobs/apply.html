{% extends 'base.html' %}

{% block title %}Apply - {{ job.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="page-header mb-4">
            <h2><i class="bi bi-send me-2"></i>Apply for {{ job.title }}</h2>
            <p>{{ job.company.company_name }} · {{ job.location }}</p>
        </div>
        <div class="card p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Cover Letter <span class="text-muted">(Optional)</span></label>
                    {{ form.cover_letter }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send me-2"></i>Submit Application
                    </button>
                    <a href="{% url 'job_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
