{% extends 'base.html' %}

{% block title %}Student Dashboard{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="fw-bold">Welcome, {{ user.username }}! 👋</h2>
        <p class="text-muted">You are logged in as a <strong>Student</strong></p>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-4">
        <div class="card text-center shadow-sm">
            <div class="card-body p-4">
                <h1 class="text-primary">0</h1>
                <p class="text-muted">Applications Sent</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center shadow-sm">
            <div class="card-body p-4">
                <h1 class="text-success">0</h1>
                <p class="text-muted">Shortlisted</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center shadow-sm">
            <div class="card-body p-4">
                <h1 class="text-warning">0</h1>
                <p class="text-muted">Pending</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
